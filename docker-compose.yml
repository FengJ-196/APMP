services:
  mongodb:
    image: mongo:latest
    container_name: apmp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: apmp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  mongodb_data:
  qdrant_data:
